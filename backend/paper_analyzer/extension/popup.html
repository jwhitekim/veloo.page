<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Paper Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #16161d;
      --sidebar: #111118;
      --card:    #1c1c26;
      --accent:  #B19CD9;
      --accent-dim: rgba(177,156,217,0.14);
      --accent-text: #c4b5fd;
      --border:  rgba(255,255,255,0.07);
      --text:    rgba(255,255,255,0.87);
      --sub:     rgba(255,255,255,0.5);
      --muted:   rgba(255,255,255,0.28);
    }

    body {
      width: 620px;
      min-height: 200px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ── Header ── */
    .header {
      background: var(--sidebar);
      color: #fff;
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 { font-size: 0.92rem; font-weight: 600; letter-spacing: 0.2px; }

    .header .open-web {
      margin-left: auto;
      font-size: 0.74rem;
      color: var(--accent-text);
      cursor: pointer;
      text-decoration: underline;
      opacity: 0.85;
    }

    /* ── Reset bar ── */
    #resetBar { display: none; margin: 12px 16px 0; }

    #resetBar button {
      font-size: 0.8rem;
      color: var(--accent-text);
      background: none;
      border: 1px solid rgba(177,156,217,0.35);
      border-radius: 6px;
      padding: 4px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }
    #resetBar button:hover { background: var(--accent-dim); }

    /* ── Drop zone ── */
    #dropzone {
      margin: 14px 16px;
      border: 1.5px dashed rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      background: var(--card);
      transition: border-color 0.2s, background 0.2s;
    }
    #dropzone.over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    #dropzone .icon { font-size: 1.8rem; margin-bottom: 8px; opacity: 0.6; }
    #dropzone .hint { color: var(--muted); font-size: 0.83rem; }
    #dropzone .hint strong { color: var(--accent-text); cursor: pointer; }
    #fileInput { display: none; }

    /* ── Status ── */
    #status {
      margin: 0 16px 10px;
      font-size: 0.83rem;
      color: var(--muted);
      text-align: center;
      min-height: 20px;
    }
    #status.loading {
      color: var(--accent);
      padding: 32px 0 24px;
      font-size: 0.95rem;
      font-weight: 600;
    }
    #status.error { color: #f87171; }

    /* ── Result ── */
    #result { display: none; padding: 0 16px 24px; }

    /* Paper title */
    .paper-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }

    .meta-chip {
      padding: 2px 9px;
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      font-size: 0.78rem;
      color: var(--sub);
    }

    .meta-row a {
      padding: 2px 9px;
      background: var(--accent-dim);
      border-radius: 4px;
      font-size: 0.78rem;
      color: var(--accent-text);
      text-decoration: none;
      font-weight: 500;
    }

    /* Journal quality */
    .quality-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .q-badge {
      width: 38px; height: 38px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.88rem; color: #fff; flex-shrink: 0;
    }
    .q-q1 { background: var(--accent); }
    .q-q2 { background: #8b9cf7; }
    .q-q3 { background: #f39c12; }
    .q-q4 { background: #6b7280; }
    .q-info .q-title { font-weight: 600; font-size: 0.84rem; color: var(--text); line-height: 1.4; }
    .q-info .q-sjr  { font-size: 0.76rem; color: var(--muted); margin-top: 2px; }

    /* Keywords */
    .kw-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .kw-tag {
      padding: 2px 10px;
      background: var(--accent-dim);
      color: var(--accent-text);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    /* Relevance banner */
    .rel-banner {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 13px; border-radius: 8px;
      font-size: 0.84rem; margin-bottom: 12px;
    }
    .rel-banner .label { font-weight: 800; white-space: nowrap; }
    .rel-high { background: rgba(39,174,96,0.14);  color: #4ade80; }
    .rel-low  { background: rgba(231,76,60,0.14);  color: #f87171; }
    .rel-mid  { background: rgba(243,156,18,0.14); color: #fbbf24; }

    /* Analysis items */
    .acc-item { border-left: 3px solid transparent; margin-bottom: 2px; }
    .acc-item.prob { border-left-color: #e74c3c; }
    .acc-item.meth { border-left-color: var(--accent); }
    .acc-item.conc { border-left-color: #27ae60; }
    .acc-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0 6px 13px;
      border-top: 1px solid var(--border);
    }
    .acc-item .lbl { font-size: 0.74rem; font-weight: 800; color: var(--sub); white-space: nowrap; }
    .acc-item .detail {
      padding: 0 13px 13px 13px;
      font-size: 0.86rem; line-height: 1.75; color: var(--sub);
    }

    /* Authors */
    .sec-label {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--muted); margin: 16px 0 8px;
    }
    .author-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .author-item:last-child { border-bottom: none; }
    .author-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .author-name { font-weight: 700; font-size: 0.9rem; color: var(--text); }
    .author-link { font-size: 0.76rem; color: var(--accent-text); flex-shrink: 0; text-decoration: none; }
    .author-meta { font-size: 0.76rem; color: var(--muted); margin: 3px 0 5px; }
    .top-papers { list-style: none; margin-top: 7px; padding-top: 7px; border-top: 1px dashed var(--border); }
    .top-papers li {
      font-size: 0.8rem; color: var(--sub);
      padding: 5px 0; border-bottom: 1px dashed rgba(255,255,255,0.04); line-height: 1.5;
    }
    .top-papers li:last-child { border-bottom: none; }
    .top-papers .cite { color: var(--muted); font-size: 0.74rem; }

    /* Figures */
    .figures-row { display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; }
    .fig-wrap { display: flex; flex-direction: column; gap: 5px; }
    .fig-thumb {
      width: 100%; max-height: 260px; object-fit: contain;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--card); cursor: zoom-in; display: block;
    }
    .fig-caption { font-size: 0.74rem; color: var(--muted); line-height: 1.4; padding: 0 2px; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <span style="font-size:1.1rem;">📄</span>
    <h1>Paper Analyzer</h1>
    <span class="open-web" id="openWeb">웹에서 열기 ↗</span>
  </div>

  <div id="dropzone">
    <div class="icon">📥</div>
    <div class="hint">PDF를 여기에 드래그하거나<br><strong id="browseBtn">파일 선택</strong>을 클릭하세요</div>
    <input type="file" id="fileInput" accept="application/pdf">
  </div>

  <div id="resetBar"><button id="resetBtn">↩ 다른 논문 분석</button></div>
  <div id="status"></div>
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
