<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      color: #ffffff;
      letter-spacing: 0.02em;
      line-height: 1.15;
    }

    header p {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      color: #8b949e;
      font-weight: 400;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2rem 1.75rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
    }

    .card:hover {
      border-color: #0d9488;
      box-shadow: 0 0 0 1px #0d9488, 0 4px 24px rgba(13, 148, 136, 0.18);
      transform: translateY(-2px);
    }

    .card:active {
      transform: translateY(0);
    }

    .card-emoji {
      font-size: 2rem;
      line-height: 1;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .card-desc {
      font-size: 0.85rem;
      color: #8b949e;
      font-weight: 400;
      line-height: 1.55;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #3d444d;
    }
  </style>
</head>
<body>
  <header>
    <h1>Lab Toolkit</h1>
    <p>PRML Lab 연구 도구 모음</p>
  </header>

  <div class="grid">
    <a class="card" href="/paper">
      <span class="card-emoji">📄</span>
      <span class="card-name">논문 분석기</span>
      <span class="card-desc">PDF·arXiv 논문 분석 및 저자 정보</span>
    </a>

    <a class="card" href="/translate">
      <span class="card-emoji">🌐</span>
      <span class="card-name">번역기</span>
      <span class="card-desc">영어 논문 용어 번역 및 네이버 사전</span>
    </a>

    <a class="card" href="/arch-trainer">
      <span class="card-emoji">🧠</span>
      <span class="card-name">아키텍처 훈련</span>
      <span class="card-desc">논문 그림 AI 설명 + 설명력 셀프 훈련</span>
    </a>

    <a class="card" href="/todo">
      <span class="card-emoji">✅</span>
      <span class="card-name">투두</span>
      <span class="card-desc">연구실 할 일 관리</span>
    </a>
  </div>

  <footer>PRML Lab &copy; 2025</footer>
</body>
</html>
